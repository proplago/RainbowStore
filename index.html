  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Overlay de diagnóstico del bundler desactivado: los errores de carga de
    // recursos del export son benignos. Se registran en consola sin tapar la UI.
    if (window.console && console.debug) console.debug('[bundle]', e && (e.message || e.type));
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

    // preserve ordering (React before ReactDOM before Babel before text/babel).

      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

 0 16px 1px rgba(255,201,60,.5)}}\n  @keyframes tpscanline{0%{top:6%}100%{top:90%}}\n  @keyframes tpscanpop{0%{transform:translateX(-50%) translateY(10px) scale(.5);opacity:0}45%{transform:translateX(-50%) translateY(0) scale(1.12);opacity:1}100%{transform:translateX(-50%) translateY(-4px) scale(1);opacity:1}}\n  @keyframes tpscanin{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}\n  @keyframes tptap{0%{transform:scale(1)}40%{transform:scale(.9)}100%{transform:scale(1)}}\n  @keyframes tpsheen{0%{background-position:-130% 0}55%,100%{background-position:230% 0}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"max-width:520px;margin:0 auto;padding:0 0 116px;min-height:100vh\">\n\n  <header style=\"padding:18px 16px 4px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px\">\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        <img src=\"__LOGO_PLACEHOLDER__\" alt=\"Rainbow Store\" style=\"height:58px;width:auto;display:block;animation:tpwob 4s ease-in-out infinite\">\n      <\u002Fdiv>\n      <div style=\"text-align:right;background:#fff;border-radius:15px;padding:8px 13px;box-shadow:0 10px 24px rgba(73,40,120,.10);border:2px solid #fff\">\n        <div style=\"font-size:9px;color:#6B5B7B;font-weight:900;text-transform:uppercase;letter-spacing:.06em\">Ganado<\u002Fdiv>\n        <div style=\"font-family:'Fredoka';font-weight:700;font-size:19px;color:#5E36C2;line-height:1.1\">{{ ganadoTxt }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:12px;background:#fff;border:2px solid #fff;border-radius:18px;padding:11px 13px;box-shadow:0 10px 24px rgba(73,40,120,.10);display:flex;align-items:center;gap:11px\">\n      <div style=\"width:42px;height:42px;flex:none;border-radius:13px;background:linear-gradient(150deg,#F3ECFF,#FFE9F3);display:grid;place-items:center;font-size:23px\">{{ levelIcon }}<\u002Fdiv>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:8px\">\n          <span style=\"font-family:'Fredoka';font-weight:700;font-size:14px\">{{ levelName }}<\u002Fspan>\n          <span style=\"font-size:11px;font-weight:900;color:#6B5B7B\">{{ levelLine }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:10px;background:#F0E6DD;border-radius:999px;overflow:hidden;margin-top:6px\">\n          <span style=\"{{ levelBarStyle }}\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{ streakChipStyle }}\">{{ streakTxt }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"padding:8px 16px 0\">\n\n    <sc-if value=\"{{ isInv }}\" hint-placeholder-val=\"{{ true }}\">\n    <section data-screen-label=\"Inventario\">\n      <button onclick=\"{{ onOpenReto }}\" style=\"{{ retoBannerStyle }}\">\n        <div style=\"width:38px;height:38px;flex:none;border-radius:12px;background:rgba(255,255,255,.22);display:grid;place-items:center;font-size:21px\">{{ retoIcon }}<\u002Fdiv>\n        <div style=\"flex:1;min-width:0;text-align:left\">\n          <div style=\"font-size:10px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;opacity:.85\">Reto del día<\u002Fdiv>\n          <div style=\"font-family:'Fredoka';font-weight:600;font-size:14px;line-height:1.15\">{{ retoLabel }}<\u002Fdiv>\n          <div style=\"height:7px;background:rgba(255,255,255,.28);border-radius:999px;overflow:hidden;margin-top:6px\"><span style=\"{{ retoBarStyle }}\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Fredoka';font-weight:700;font-size:13px;flex:none\">{{ retoSub }}<\u002Fdiv>\n      <\u002Fbutton>\n\n      <div style=\"font-family:'Fredoka';font-weight:600;font-size:16px;margin:16px 2px 12px;display:flex;align-items:center;gap:8px\">📦 Tu inventario <span style=\"font-family:'Nunito';font-weight:900;font-size:12px;color:#6B5B7B;background:#fff;border:2px solid #F0E6DD;padding:2px 9px;border-radius: FC3B4;border-bottom:4px solid #1FC3B4;border-radius:0 0 8px 0\"><\u002Fdiv>\n      <div style=\"position:absolute;left:8%;right:8%;height:3px;border-radius:999px;background:linear-gradient(90deg,transparent,#1FC3B4,transparent);box-shadow:0 0 14px 2px rgba(31,195,180,.7);animation:tpscanline 1.7s ease-in-out infinite alternate\"><\u002Fdiv>\n      <div style=\"position:absolute;left:10px;right:10px;bottom:12px;text-align:center;color:#fff;font-weight:800;font-size:12px;background:rgba(26,18,38,.5);padding:6px 10px;border-radius:10px;backdrop-filter:blur(2px)\">{{ scanHint }}<\u002Fdiv>\n      {{ scanPopEl }}\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ scanPending }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:8;background:rgba(20,13,30,.93);backdrop-filter:blur(4px);display:flex;flex-direction:column;justify-content:center;padding:26px;animation:tpfade .2s ease\">\n      <div style=\"max-width:460px;width:100%;margin:0 auto\">\n        <div style=\"text-align:center;color:#fff\">\n          <div style=\"font-size:42px\">🔍<\u002Fdiv>\n          <div style=\"font-family:'Fredoka';font-weight:700;font-size:20px;margin-top:4px\">Código nuevo detectado<\u002Fdiv>\n          <div style=\"font-size:13px;font-weight:800;opacity:.78;margin-top:3px\">¿De qué juguete es este código?<\u002Fdiv>\n          <div style=\"display:inline-block;margin-top:9px;font-family:monospace;font-size:12px;background:rgba(255,255,255,.13);padding:6px 13px;border-radius:9px;color:#FFC93C;word-break:break-all\">{{ scanPendingCode }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;max-height:44vh;overflow:auto\">\n          <sc-for list=\"{{ scanLinkProducts }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ item.onLink }}\" style=\"{{ item.style }}\">\n              <div style=\"{{ item.thumbStyle }}\">{{ item.emoji }}<\u002Fdiv>\n              <div style=\"flex:1;min-width:0;text-align:left;font-family:'Fredoka';font-weight:600;font-size:13px;color:#2B1B3D;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ item.name }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ onCancelLink }}\" style=\"width:100%;margin-top:15px;border:none;background:rgba(255,255,255,.14);color:#fff;font-family:'Fredoka';font-weight:700;font-size:15px;padding:13px;border-radius:14px;cursor:pointer\">Cancelar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"margin-top:14px;flex:1;min-height:0;overflow:auto\">\n      <div style=\"color:rgba(255,255,255,.72);font-weight:800;font-size:12px;margin:0 2px 9px\">{{ scanManualLabel }}<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <sc-for list=\"{{ scanProducts }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ item.onScan }}\" disabled=\"{{ item.out }}\" style=\"{{ item.cardStyle }}\">\n            <div style=\"{{ item.thumbStyle }}\">{{ item.thumbEmoji }}<\u002Fdiv>\n            <div style=\"flex:1;min-width:0;text-align:left\">\n              <div style=\"font-family:'Fredoka';font-weight:600;font-size:13px;color:#2B1B3D;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ item.name }}<\u002Fdiv>\n              <div style=\"font-size:11px;font-weight:900;color:#6B5B7B;margin-top:2px\">{{ item.sub }}<\u002Fdiv>\n              <div style=\"{{ item.barcodeStyle }}\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:12px;flex:none;background:rgba(255,255,255,.97);border-radius:20px;padding:13px 15px;box-shadow:0 -10px 30px rgba(0,0,0,.25)\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\">\n        <div>\n          <div style=\"font-size:11px;font-weight:900;color:#6B5B7B;text-transform:uppercase;letter-spacing:.05em\">Ticket<\u002Fdiv>\n          <div style=\"font-family:'Fredoka';font-weight:700;font-size:22px;line-height:1.1\">{{ scanTotalTxt }}<\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:900;color:#1FC3B4\">{{ scanGainTxt }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:right;font-size:12px;font-weight:900;color:#6B5B7B\">{{ scanCountTxt }}<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ onCloseScanner }}\" style=\"width:100%;border:none;border-radius:14px;padding:14px;font-family:'Fredoka';font-weight:700;font-size:16px;color:#fff;cursor:pointer;margin-top:11px;background:linear-gradient(150deg,#FF5DA2,#FF7A5A)\">{{ scanDoneTxt }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ toastOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:fixed;left:50%;top:16%;z-index:80;background:#fff;border-radius:18px;padding:14px 22px;box-shadow:0 18px 40px rgba(73,40,120,.22);text-align:center;border:3px solid #FFC93C;animation:tppop .35s cubic-bezier(.2,.9,.3,1) both\">\n  <div style=\"font-family:'Fredoka';font-weight:700;font-size:18px\">{{ toastTitle }}<\u002Fdiv>\n  <div style=\"font-weight:900;color:#1FC3B4;font-size:15px\">{{ toastSub }}<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}\">\nclass Component extends DCLogic {\n  LEVELS = [\n    {name:'Puesto', icon:'🪧', min:0},\n    {name:'Changarrito', icon:'🏠', min:100},\n    {name:'Tiendita', icon:'🏪', min:300},\n    {name:'Súper Tiendita', icon:'🛒', min:700},\n    {name:'Mega Tienda', icon:'🏬', min:1500},\n    {name:'Imperio POP', icon:'👑', min:3000},\n  ];\n  SEED = [\n    {id:\"p1\", name:\"Fugglers\",          emoji:\"🦷\", photo:null, cost:19.55, price:50,  stock:12, color:\"#7A4FE0\"},\n    {id:\"p2\", name:\"Ready 2 Robot\",     emoji:\"🤖\", photo:null, cost:62.88, price:100, stock:16, color:\"#1FC3B4\"},\n    {id:\"p3\", name:\"Dumplings virales\", emoji:\"🥟\", photo:null, cost:7.46,  price:30,  stock:12, color:\"#FF7A5A\"},\n    {id:\"p4\", name:\"Butter squishies\",  emoji:\"🧈\", photo:null, cost:5.80,  price:20,  stock:12, color:\"#FFC93C\"},\n  ];\n  EMOS = [\"📦\",\"🦷\",\"🤖\",\"🥟\",\"🧈\",\"🧸\",\"⭐\",\"🦄\",\"🐱\",\"🍭\",\"💎\",\"🎈\"];\n  PHRASES = [\"¡Gracias por tu compra! 💜\",\"¡Vuelve pronto! 🌟\",\"¡Cliente estrella! ✨\",\"¡El mejor cliente! 🏆\",\"Hecho con cariño 🍭\",\"¡Eres lo máximo! 🎉\",\"¡Gracias, gracias! 🙌\",\"¡Compra feliz! 😄\"];\n\n  state = { tab:'inv', products:[], sales:[], sheet:null, toast:null, polaroid:null, scan:null, loaded:false };\n\n  componentDidMount(){\n    let products=null, sales=[];\n    try{ products = JSON.parse(localStorage.getItem('tpop:products')); }catch(e){}\n    try{ sales = JSON.parse(localStorage.getItem('tpop:sales'))||[]; }catch(e){}\n    if(!Array.isArray(products)){ products = JSON.parse(JSON.stringify(this.SEED)); }\n    if(!Array.isArray(sales)){ sales = []; }\n    this.setState({products, sales, loaded:true});\n  }\n  persist(){\n    try{\n      localStorage.setItem('tpop:products', JSON.stringify(this.state.products));\n      localStorage.setItem('tpop:sales', JSON.stringify(this.state.sales));\n    }catch(e){}\n  }\n\n  money(n){ const r=Math.round((n+Number.EPSILON)*100)/100; return '$'+(Number.isInteger(r)?r:r.toFixed(2)); }\n  find(id){ return this.state.products.find(p=>p.id===id); }\n  soldQty(pid){ return this.state.sales.filter(s=>s.productId===pid).reduce((a,s)=>a+s.qty,0); }\n  totals(){\n    let ingresos=0, costoVendido=0, invertido=0, nVentas=0;\n    this.state.sales.forEach(s=>{ ingresos+=s.qty*s.unitPrice; costoVendido+=s.qty*s.unitCost; nVentas+=s.qty; });\n    this.state.products.forEach(p=>{ invertido += p.cost*(p.stock+this.soldQty(p.id)); });\n    return {ingresos, ganancia:ingresos-costoVendido, invertido, nVentas};\n  }\n  streak(){\n    if(!this.state.sales.length) return 0;\n    const days=[...new Set(this.state.sales.map(s=>new Date(s.ts).toDateString()))].map(d=>new Date(d).getTime()).sort((a,b)=>b-a);\n    let st=1;\n    for(let i=1;i<days.length;i++){ if(days[i-1]-days[i]===86400000) st++; else break; }\n    return st;\n  }\n  gameStats(){\n    const t=this.totals();\n    const xp=Math.max(0,Math.round(t.ganancia));\n    let idx=0; for(let i=0;i<this.LEVELS.length;i++){ if(xp>=this.LEVELS[i].min) idx=i; }\n    const cur=this.LEVELS[idx], next=this.LEVELS[idx+1];\n    const into=xp-cur.min, need=next?next.min-cur.min:1;\n    const pct=next?Math.min(100,Math.round(into/need*100)):100;\n    return {xp, idx, cur, next, into, need, pct, t, streak:this.streak()};\n  }\n  challengesList(){\n    const today=new Date().toDateString();\n    const todayQty=this.state.sales.filter(s=>new Date(s.ts).toDateString()===today).reduce((a,s)=>a+s.qty,0);\n    const t=this.totals();\n    const recuper=Math.min(t.ingresos,t.invertido);\n    const distinct=new Set(this.state.sales.map(s=>s.productId)).size;\n    const photos=this.state.sales.filter(s=>s.photo).length;\n    const defs=[\n      {id:'hoy', icon:'☀️', label:'Vende 5 hoy', cur:Math.min(todayQty,5), goal:5, reward:'🍭', money:false},\n      {id:'inv', icon:'🐷', label:'Recupera la inversión', cur:Math.round(recuper), goal:Math.max(1,Math.round(t.invertido)), reward:'🏅', money:true},\n      {id:'col', icon:'🌈', label:'Vende uno de cada juguete', cur:distinct, goal:Math.max(1,this.state.products.length), reward:'⭐', money:false},\n      {id:'foto', icon:'📸', label:'Toma 3 fotos de ventas', cur:Math.min(photos,3), goal:3, reward:'💎', money:false},\n    ];\n    return defs.map(c=>({...c, pct:Math.min(100,Math.round(c.cur/c.goal*100)), done:c.cur>=c.goal}));\n  }\n  badgeDefs(){\n    const t=this.totals(), st=this.streak();\n    return [\n      {id:'first', emoji:'🥇', label:'Primera venta', on:this.state.sales.length>=1},\n      {id:'c100',  emoji:'💯', label:'$100 ganados', on:t.ganancia>=100},\n      {id:'fire',  emoji:'🔥', label:'Racha de 3 días', on:st>=3},\n      {id:'pig',   emoji:'🐷', label:'Inversión lista', on:t.invertido>0 && t.ingresos>=t.invertido},\n      {id:'ten',   emoji:'🛍️', label:'10 ventas', on:t.nVentas>=10},\n      {id:'crown', emoji:'👑', label:'$1000 ganados', on:t.ganancia>=1000},\n    ];\n  }\n  unlockedBadgeIds(){ return this.badgeDefs().filter(b=>b.on).map(b=>b.id); }\n\n  // sheets\n  openAdd(){ this.setState({sheet:{type:'add', name:'', cost:'', price:'', stock:'', emoji:'📦', photo:null}}); }\n  openEdit(p){ this.setState({sheet:{type:'edit', id:p.id, name:p.name, cost:String(p.cost), price:String(p.price), stock:String(p.stock), emoji:p.emoji, photo:p.photo}}); }\n  openRestock(p){ this.setState({sheet:{type:'restock', id:p.id, name:p.name, stock:p.stock, qty:1}}); }\n  openSell(p){ this.setState({sheet:{type:'sell', id:p.id, qty:1, photo:null}}); }\n  openReset(){ this.setState({sheet:{type:'reset', code:'', err:false}}); }\n  openReto(){ this.setState({sheet:{type:'reto'}}); }\n  closeSheet(){ this.setState({sheet:null}); }\n  patchSheet(o){ this.setState(s=>({sheet:{...s.sheet, ...o}})); }\n\n  pickColor(){ const c=[\"#7A4FE0\",\"#1FC3B4\",\"#FF7A5A\",\"#FFC93C\",\"#FF5DA2\"]; return c[this.state.products.length % c.length]; }\n\n  saveProduct(){\n    const sh=this.state.sheet; const name=(sh.name||'').trim();\n    if(!name) return;\n    const cost=parseFloat(sh.cost)||0, price=parseFloat(sh.price)||0, stock=parseInt(sh.stock)||0;\n    let products;\n    if(sh.type==='edit'){\n      products=this.state.products.map(p=> p.id===sh.id ? {...p, name, cost, price, stock, emoji:sh.emoji, photo:sh.photo} : p);\n    } else {\n      products=[...this.state.products, {id:'p'+Date.now(), name, emoji:sh.emoji, photo:sh.photo, cost, price, stock, color:this.pickColor()}];\n    }\n    this.setState({products, sheet:null}, ()=>this.persist());\n  }\n  doRestock(){\n    const sh=this.state.sheet;\n    const products=this.state.products.map(p=> p.id===sh.id ? {...p, stock:p.stock+sh.qty} : p);\n    this.setState({products, sheet:null}, ()=>this.persist());\n  }\n  doSell(){\n    const sh=this.state.sheet; const p=this.find(sh.id); if(!p) return;\n    const beforeBadges=this.unlockedBadgeIds();\n    const beforeLevel=this.gameStats().idx;\n    const gain=sh.qty*(p.price-p.cost);\n    const products=this.state.products.map(x=> x.id===p.id ? {...x, stock:Math.max(0,x.stock-sh.qty)} : x);\n    const phrase=this.PHRASES[Math.floor(Math.random()*this.PHRASES.length)];\n    const sale={id:'s'+Date.now(), productId:p.id, name:p.name, qty:sh.qty, unitPrice:p.price, unitCost:p.cost, photo:sh.photo, phrase, ts:Date.now()};\n    this.setState({products, sales:[...this.state.sales, sale], sheet:null}, ()=>{\n      this.persist();\n      const after=this.unlockedBadgeIds();\n      const newB=after.filter(x=>!beforeBadges.includes(x));\n      const levelUp=this.gameStats().idx>beforeLevel;\n      this.celebrate(sale, gain, levelUp, newB);\n    });\n  }\n  RESET_CODE='1762';\n  doReset(){\n    const sh=this.state.sheet;\n    if(!sh || sh.code!==this.RESET_CODE){ this.patchSheet({err:true}); return; }\n    this.setState({products:JSON.parse(JSON.stringify(this.SEED)), sales:[], sheet:null, tab:'inv'}, ()=>this.persist());\n  }\n\n  celebrate(sale, gain, levelUp, newBadges){\n    let title='¡Venta hecha! 🎉';\n    if(levelUp){ const g=this.gameStats(); title='¡Subiste a '+g.cur.name+'! '+g.cur.icon; }\n    else if(newBadges&&newBadges.length){ const b=this.badgeDefs().find(x=>x.id===newBadges[0]); title='¡Nueva medalla! '+b.emoji+' '+b.label; }\n    this.setState({toast:{title, sub:'+'+this.money(gain)+' de ganancia'}});\n    clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:null}), 2400);\n    this.confetti(levelUp?120:75);\n    if(sale && sale.photo){ this.setState({polaroid:{photo:sale.photo, phrase:sale.phrase, gain, caption:this.captionFor(sale.ts), saleId:sale.id, fromGallery:false}}); }\n  }\n  miniToast(title, sub){\n    this.setState({toast:{title, sub:sub||''}});\n    clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:null}), 2200);\n  }\n\n  // ---- cash register scanner ----\n  warmAudio(){\n    try{\n      const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx) return;\n      this._ac=this._ac||new Ctx();\n      if(this._ac.state==='suspended') this._ac.resume();\n    }catch(e){}\n  }\n  cashSound(){\n    try{\n      const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx) return;\n      this._ac=this._ac||new Ctx();\n      const ac=this._ac; if(ac.state==='suspended') ac.resume();\n      const now=ac.currentTime;\n      const ding=(freq,t0,dur,vol,type)=>{\n        const o=ac.createOscillator(), g=ac.createGain();\n        o.type=type||'triangle'; o.frequency.value=freq;\n        g.gain.setValueAtTime(0.0001, now+t0);\n        g.gain.linearRampToValueAtTime(vol, now+t0+0.006);\n        g.gain.exponentialRampToValueAtTime(0.0001, now+t0+dur);\n        o.connect(g); g.connect(ac.destination);\n        o.start(now+t0); o.stop(now+t0+dur+0.03);\n      };\n      // drawer thunk\n      ding(180, 0, 0.09, 0.16, 'sine');\n      // \"cha\" — bright double\n      ding(1318.5, 0.02, 0.14, 0.20);\n      ding(1567.98, 0.04, 0.14, 0.14);\n      // \"ching\" — ringing bell\n      ding(1975.5, 0.13, 0.55, 0.22);\n      ding(2637.0, 0.13, 0.55, 0.11);\n    }catch(e){}\n  }\n  openScanner(){ this.warmAudio(); this._lastCode=null; this.setState({scan:{lines:[], flash:0, lastId:null, lastGain:0, cam:'idle', detect:'idle', pending:null}}, ()=>this.startCamera()); }\n  patchScan(o){ this.setState(s=> s.scan ? ({scan:{...s.scan, ...o}}) : null); }\n  async startCamera(){\n    try{\n      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ this.patchScan({cam:'unsupported', detect:'manual'}); return; }\n      clearTimeout(this._camTimer
